# ═══════════════════════════════════════
#  Finsio Redis Configuration
# ═══════════════════════════════════════

# Network
bind 0.0.0.0
protected-mode no
port 6379

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Logging
loglevel notice
logfile ""

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 300

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""
