# ═══════════════════════════════════════
#  Finsio Nginx Reverse Proxy
#
#  Routes:
#    /api/v1/*    → Fusio API Gateway
#    /portal/*    → Fusio Developer Portal
#    /admin/*     → Fusio Admin Panel
#    /django-admin/ → Django Admin (internal)
#    /internal/   → Django Backend (internal only)
#    /webhooks/*  → Django Backend (public)
#    /health      → Django Backend (public)
#    /static/*    → Static files
# ═══════════════════════════════════════

upstream fusio {
    server gateway:80;
    keepalive 16;
}

upstream django {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name finsio.local localhost;

    client_max_body_size 10M;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Fusio API Gateway ──
    location /api/v1/ {
        proxy_pass http://fusio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ── Fusio Developer Portal ──
    location /portal/ {
        proxy_pass http://fusio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Fusio Admin Panel ──
    location /admin/ {
        proxy_pass http://fusio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Django Admin (restricted) ──
    location /django-admin/ {
        # In production, restrict to internal network
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Django Internal API (gateway-to-backend only) ──
    location /internal/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 15s;
    }

    # ── Webhook Receivers (public, provider-verified) ──
    location /webhooks/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Larger body for webhook payloads
        client_max_body_size 5M;
    }

    # ── Health Check ──
    location /health {
        proxy_pass http://django;
        proxy_set_header Host $host;
    }

    # ── Static Files ──
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Default ──
    location / {
        return 404 '{"error": "not_found", "message": "Use /api/v1/ for API access"}';
        add_header Content-Type application/json;
    }
}
