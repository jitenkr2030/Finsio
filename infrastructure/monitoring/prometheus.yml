# ═══════════════════════════════════════
#  Finsio Prometheus Monitoring
# ═══════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "finsio-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/django-admin/prometheus/metrics"
    scrape_interval: 30s

  - job_name: "finsio-gateway"
    static_configs:
      - targets: ["gateway:80"]
    metrics_path: "/api/v1/health"
    scrape_interval: 30s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  - job_name: "celery"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/django-admin/prometheus/celery"
    scrape_interval: 60s
